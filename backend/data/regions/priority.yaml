# Region priority list for the population program — FOUNDER-OWNED.
#
# File order IS priority order: `python -m place.ingest.cli coverage` marks the
# first region below target as NEXT, and the populate-region skill works that
# one. Reorder lines to repoint the program; code (place/ingest/regions.py)
# validates this file but never rewrites it.
#
# Coordinates are zip-area centroids, not survey points — they only anchor a
# radius_mi circle for Overpass scoping and coverage counts. Targets follow
# docs/03 §6 step 8 (150 dense, condition-wired places beat 400 shallow ones);
# override per region by adding target_places / target_affordances to its entry.
# target_affordances counts ANY status — review-queue depth is progress here,
# publication is gated elsewhere (docs/00-THESIS.md §7 "Claim").

defaults:
  radius_mi: 20
  target_places: 150
  target_affordances: 30

regions:
