name: pages

# Static demo of the PWA (canon fixtures, NEXT_PUBLIC_MOCK=1) published to
# https://parthivnair.github.io/place/ — see web/next.config.ts for the
# GITHUB_PAGES=1 export config. The real API-backed deployment is the VPS
# story in docs/04-ARCHITECTURE.md §9, not this.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build static export (mock fixtures, /place basePath)
        working-directory: web
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_MOCK: "1"
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
