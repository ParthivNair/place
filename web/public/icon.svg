<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Place mark: fir point inside a hollow ring on warm paper.
       Hexes hardcoded from tokens.css: paper #FBFAF6, forest #29583F
       (token names dropped here: double hyphens are invalid inside XML
       comments and break strict SVG parsers). Mark stays inside the
       center 80% for the maskable safe zone. -->
  <rect width="512" height="512" fill="#FBFAF6"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#29583F" stroke-width="18"/>
  <circle cx="256" cy="256" r="84" fill="#29583F"/>
</svg>
